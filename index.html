<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월별 전력 수급 현황 시각화</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            margin: 0 0 10px 0;
            color: #0d6efd;
        }

        header p {
            margin: 0;
            color: #6c757d;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 24px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 500px;
        }

        /* 로딩 애니메이션 및 에러 메시지 스타일 */
        #status-message {
            text-align: center;
            font-weight: bold;
            margin: 20px 0;
            color: #6c757d;
        }
        
        .error {
            color: #dc3545 !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>월별 전력 수급 현황</h1>
        <p>CSV 데이터를 활용한 공급능력 및 최대부하 비교 시각화</p>
    </header>

    <div class="container">
        <div id="status-message">데이터를 불러오는 중입니다...</div>
        <div class="chart-container">
            <canvas id="powerChart"></canvas>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 사용자의 CSV 파일 설정에 맞게 수정하는 부분
        // ==========================================
        const CONFIG = {
            csvFileName: './electricity_data.csv', // 👈 실제 CSV 파일명으로 변경하세요 (예: 'data.csv')
            columnMonth: '연월',                    // 👈 X축이 될 열 이름 (예: '날짜', 'Month')
            columnSupply: '공급능력(MW)',            // 👈 Y축 비교 대상 1 (예: '공급능력')
            columnDemand: '최대부하(MW)'             // 👈 Y축 비교 대상 2 (예: '현재수요', '사용량')
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetchCSVAndRenderChart();
        });

        // 1. CSV 파일 가져오기 및 파싱
        async function fetchCSVAndRenderChart() {
            const statusEl = document.getElementById('status-message');
            try {
                const response = await fetch(CONFIG.csvFileName);
                if (!response.ok) {
                    throw new Error(`CSV 파일을 찾을 수 없거나 불러오지 못했습니다. (상태코드: ${response.status})`);
                }
                
                const csvText = await response.text();
                const parsedData = parseCSV(csvText);

                if (parsedData.labels.length === 0) {
                    throw new Error("CSV 데이터가 비어있거나 열 이름이 일치하지 않습니다. CONFIG 설정을 확인해주세요.");
                }

                statusEl.style.display = 'none'; // 로딩 메시지 숨김
                renderChart(parsedData);
                
            } catch (error) {
                statusEl.textContent = `❌ 에러 발생: ${error.message}`;
                statusEl.classList.add('error');
                console.error(error);
            }
        }

        // 2. 간단한 CSV 파서 (쉼표 및 줄바꿈 기준 분리)
        function parseCSV(text) {
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length === 0) return { labels: [], supply: [], demand: [] };

            // 첫 번째 줄(헤더) 분석하여 각 열의 인덱스 찾기
            const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
            const idxMonth = headers.indexOf(CONFIG.columnMonth);
            const idxSupply = headers.indexOf(CONFIG.columnSupply);
            const idxDemand = headers.indexOf(CONFIG.columnDemand);

            if (idxMonth === -1 || idxSupply === -1 || idxDemand === -1) {
                console.error("지정된 열 이름을 찾을 수 없습니다.", { headers, CONFIG });
                return { labels: [], supply: [], demand: [] };
            }

            const labels = [];
            const supply = [];
            const demand = [];

            // 데이터 행 순회
            for (let i = 1; i < lines.length; i++) {
                const row = lines[i].split(',').map(cell => cell.trim().replace(/"/g, ''));
                if (row.length <= Math.max(idxMonth, idxSupply, idxDemand)) continue;

                labels.push(row[idxMonth]);
                // 숫자에 콤마(,)가 포함되어 있을 경우를 대비해 숫자로 변환
                supply.push(parseFloat(row[idxSupply].replace(/,/g, '')) || 0);
                demand.push(parseFloat(row[idxDemand].replace(/,/g, '')) || 0);
            }

            return { labels, supply, demand };
        }

        // 3. Chart.js를 이용한 시각화
        function renderChart(data) {
            const ctx = document.getElementById('powerChart').getContext('2d');
            
            new Chart(ctx, {
                type: 'bar', // 기본 차트 형태 (바 차트)
                data: {
                    labels: data.labels,
                    datasets: [
                        {
                            label: CONFIG.columnSupply,
                            data: data.supply,
                            backgroundColor: 'rgba(54, 162, 235, 0.6)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1,
                            type: 'bar' // 막대그래프로 표시
                        },
                        {
                            label: CONFIG.columnDemand,
                            data: data.demand,
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 2,
                            type: 'line', // 트렌드를 보기 쉽게 꺾은선으로 혼합 표시
                            tension: 0.2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'top',
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false, // 전력량 특성상 0부터 시작하면 차이가 잘 안 보일 수 있으므로 자동으로 최적화
                            title: {
                                display: true,
                                text: '전력량 (MW)'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: '연월'
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
